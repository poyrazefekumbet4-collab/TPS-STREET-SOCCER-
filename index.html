<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPS Türkiye Sokak Ligi | Gerçek Sıralama</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9;
            --elmas: #00d2ff; --zumrut: #00ff87; --altin: #ffcc00;
            --tas: #8b949e; --toprak: #a0522d;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { color: #fff; text-transform: uppercase; margin: 0; font-size: 24px; text-shadow: 0 0 10px rgba(0,210,255,0.5); }
        .nav-btns { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 450px; }
        .nav-btns button { flex: 1; padding: 12px; border: 2px solid #30363d; background: var(--card); color: #fff; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 14px; }
        .nav-btns button.active { border-color: #58a6ff; background: #1f2937; box-shadow: 0 0 15px rgba(88,166,255,0.3); }
        
        .list-container { width: 100%; max-width: 450px; display: none; }
        .list-container.active { display: block; }

        .player-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .p-info { display: flex; align-items: center; gap: 12px; }
        .p-rank { font-size: 18px; font-weight: bold; color: #58a6ff; min-width: 25px; text-align: center; }
        .p-name { font-weight: bold; color: #fff; font-size: 15px; text-transform: uppercase; }
        .p-points { color: #8b949e; font-size: 11px; margin-top: 2px; }
        
        .p-stats-wrapper { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .stats-labels { display: flex; gap: 5px; font-size: 8px; color: #8b949e; padding-right: 2px; }
        .stats-labels span { width: 30px; text-align: center; }
        .p-stats { display: flex; gap: 5px; }
        .s-box { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 14px; color: #000; transition: 0.2s; }
        
        /* Gerçek Rütbe Renkleri */
        .rank-1 { background: var(--elmas); box-shadow: 0 0 10px rgba(0,210,255,0.4); }
        .rank-2 { background: var(--zumrut); box-shadow: 0 0 10px rgba(0,255,135,0.4); }
        .rank-3 { background: var(--altin); box-shadow: 0 0 10px rgba(255,204,0,0.4); }
        .rank-4 { background: var(--tas); color: #fff; }
        .rank-5 { background: var(--toprak); color: #fff; }
        .rank-low { background: #30363d; color: #fff; border: 1px solid #444; }

        .player-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="header">
    <h1>TÜRKİYE SOKAK LİGİ</h1>
    <p style="color: #8b949e; font-size: 12px;">Sıralama Puanı ve Rütbeler Günceldir</p>
</div>
