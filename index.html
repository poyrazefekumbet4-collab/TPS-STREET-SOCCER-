<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPStiers | Pheno</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --text-gray: #9ca3af;
            --gold: #fbbf24;
        }

        /* Arka Plan Mor-Yeşil Geçiş Efekti */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: white;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Header & Menü */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-icon { font-size: 24px; cursor: pointer; color: var(--accent-purple); }
        .logo { font-size: 22px; font-weight: 800; italic; color: var(--accent-purple); text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

        /* Welcome Section */
        .welcome-box {
            text-align: center;
            padding: 20px;
            margin: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
        }
        .welcome-box h1 { margin: 0; font-size: 1.5rem; }
        .welcome-box p { color: var(--accent-green); margin: 5px 0 0; font-weight: bold; }

        /* Platform Seçimi (Mobil / PC) */
        .tabs {
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .tab-btn.active {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-green));
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        /* Kategoriler (Moss, Pas, GK, Genel) */
        .categories {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 20px;
        }
        .cat-btn {
            padding: 8px 16px;
            background: #222;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            border: 1px solid #333;
        }
        .cat-btn.active { background: #444; border-color: var(--text-gray); }

        /* Oyuncu Kartı Tasarımı */
        .player-list { padding: 0 20px 20px; }
        .player-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--accent-purple);
            position: relative;
            transition: 0.3s;
        }
        .player-card:hover { transform: scale(1.02); }
        
        .rank { font-size: 24px; font-weight: 900; color: var(--accent-green); width: 40px; }
        .info { flex-grow: 1; }
        .info .name { font-weight: bold; font-size: 18px; display: block; }
        .info .points { color: var(--gold); font-size: 13px; }

        .stats { display: flex; gap: 8px; }
        .stat-box {
            background: #222;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            min-width: 35px;
            border: 1px solid #333;
        }
        .stat-box.highlight { box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); border-color: var(--accent-purple); }
        .stat-label { font-size: 9px; color: var(--text-gray); display: block; margin-bottom: 2px; }
        .stat-val { font-weight: bold; color: #fff; }

        /* Renk Seviyeleri (Senin resimlerdeki gibi) */
        .val-1 { color: #818cf8; } /* Elmas mavisi */
        .val-2 { color: #4ade80; } /* Zümrüt yeşili */
        .val-3 { color: #fbbf24; } /* Altın sarısı */
    </style>
</head>
<body>

    <header>
        <div class="menu-icon">☰</div>
        <div class="logo">TPStiers</div>
        <div style="width: 24px;"></div>
    </header>

    <div class="welcome-box">
        <h1>Tpstierse Hoşgeldiniz</h1>
        <p>Yapımcı: Pheno</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active">📱 MOBİL</button>
        <button class="tab-btn">💻 PC</button>
    </div>

    <div class="categories">
        <div class="cat-btn">MOSS</div>
        <div class="cat-btn">PAS</div>
        <div class="cat-btn">GK</div>
        <div class="cat-btn active">GENEL</div>
    </div>

    <div class="player-list">
        <h3 style="margin-bottom: 15px; font-size: 14px; color: var(--text-gray);">GENEL MOBİL SIRALAMASI</h3>

        <div class="player-card">
            <div class="rank">#1</div>
            <div class="info">
                <span style="color:var(--gold); font-size: 10px;">👑 TOP 1</span>
                <span class="name">HACI</span>
                <span class="points">500.7 puan</span>
            </div>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">MOSS</span><span class="stat-val val-1">1</span></div>
                <div class="stat-box"><span class="stat-label">PAS</span><span class="stat-val val-1">1</span></div>
                <div class="stat-box highlight"><span class="stat-label">GK</span><span class="stat-val val-2">2</span></div>
            </div>
        </div>

        <div class="player-card" style="border-left-color: var(--accent-green);">
            <div class="rank">#2</div>
            <div class="info">
                <span class="name">SABENJR</span>
                <span class="points">330.7 puan</span>
            </div>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">MOSS</span><span class="stat-val val-1">1</span></div>
                <div class="stat-box highlight"><span class="stat-label">PAS</span><span class="stat-val val-2">2</span></div>
                <div class="stat-box"><span class="stat-label">GK</span><span class="stat-val val-1">1</span></div>
            </div>
        </div>

        <div class="player-card">
            <div class="rank">#3</div>
            <div class="info">
                <span style="color:var(--gold); font-size: 10px;">👑 LEGEND</span>
                <span class="name">LUXERA</span>
                <span class="points">500.5 puan</span>
            </div>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">MOSS</span><span class="stat-val val-1">1</span></div>
                <div class="stat-box"><span class="stat-label">PAS</span><span class="stat-val val-1">1</span></div>
                <div class="stat-box"><span class="stat-label">GK</span><span class="stat-val val-1">1</span></div>
            </div>
        </div>

    </div>

    <script>
        // Buraya ileride butonlara basınca listeyi değiştiren JS kodlarını ekleyeceğiz gardaş.
        console.log("Pheno TpsTiers Hazır!");
    </script>
</body>
</html>
